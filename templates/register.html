<!DOCTYPE html>
<html>
<head><title>Register</title>
    <style>
    body { background: linear-gradient(135deg, #005088 0%, #002d4d 100%); height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
    .auth-card { background: white; color: #333; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 350px; text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #005088; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
    button:hover { background: #003a63; transform: translateY(-2px); }
</style>
</head>
<body>
    <div class="auth-card">
        <h2>Create Account</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required><br><br>
            <input type="password" name="password" placeholder="Password" required><br><br>
            <button type="submit" style="background:#005088; color:white; padding:10px 20px; border:none; border-radius:4px;">Register</button>
        </form>
        <p>Already have an account? <a href="/login">Login here</a></p>
    </div>
</body>
</html>
